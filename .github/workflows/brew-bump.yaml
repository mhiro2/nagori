name: Bump Homebrew tap

# Fires after a `v*` GitHub release is published. release.yaml flips the
# draft to published as its final step, so this workflow runs once the
# bundles are ready and the release is final. workflow_dispatch is kept for
# re-running against an existing release if the tap secret is rotated.

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to the tap (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: brew-bump-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve tag and version
        id: meta
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          if [[ -z "${TAG}" ]]; then
            echo "no tag found on event payload" >&2
            exit 1
          fi
          if [[ "${TAG}" != v* ]]; then
            echo "tag '${TAG}' does not start with 'v' — skipping tap bump"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "skip=false"         >> "$GITHUB_OUTPUT"
      - name: Download .dmg artifacts
        if: steps.meta.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          mkdir -p dist
          # Tauri names bundles `Nagori_<version>_<arch>.dmg`. Pull both arches.
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*aarch64.dmg' \
            --pattern '*x64.dmg' \
            --dir dist
          ls -la dist
      - name: Compute sha256
        if: steps.meta.outputs.skip != 'true'
        id: sha
        run: |
          arm_dmg=$(ls dist/*aarch64.dmg | head -n1)
          x64_dmg=$(ls dist/*x64.dmg     | head -n1)
          arm_sha=$(sha256sum "${arm_dmg}" | cut -d' ' -f1)
          x64_sha=$(sha256sum "${x64_dmg}" | cut -d' ' -f1)
          echo "arm_sha=${arm_sha}"               >> "$GITHUB_OUTPUT"
          echo "x64_sha=${x64_sha}"               >> "$GITHUB_OUTPUT"
          echo "arm_name=$(basename "${arm_dmg}")" >> "$GITHUB_OUTPUT"
          echo "x64_name=$(basename "${x64_dmg}")" >> "$GITHUB_OUTPUT"
      - name: Checkout homebrew-tap
        if: steps.meta.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mhiro2/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Render Casks/nagori.rb
        if: steps.meta.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          X64_SHA: ${{ steps.sha.outputs.x64_sha }}
          ARM_NAME: ${{ steps.sha.outputs.arm_name }}
          X64_NAME: ${{ steps.sha.outputs.x64_name }}
        run: |
          mkdir -p tap/Casks
          # The bundle filenames embed the version, so we template that segment
          # with `#{version}` to keep the cask self-updating-friendly.
          arm_url_template="${ARM_NAME//${VERSION}/#\{version\}}"
          x64_url_template="${X64_NAME//${VERSION}/#\{version\}}"
          cat > tap/Casks/nagori.rb <<EOF
          # This file is generated by .github/workflows/brew-bump.yaml. DO NOT EDIT.
          cask "nagori" do
            version "${VERSION}"

            on_macos do
              on_arm do
                sha256 "${ARM_SHA}"
                url "https://github.com/mhiro2/nagori/releases/download/v#{version}/${arm_url_template}",
                  verified: "github.com/mhiro2/nagori/"
              end
              on_intel do
                sha256 "${X64_SHA}"
                url "https://github.com/mhiro2/nagori/releases/download/v#{version}/${x64_url_template}",
                  verified: "github.com/mhiro2/nagori/"
              end
            end

            name "Nagori"
            desc "Local-first, AI-assisted clipboard manager"
            homepage "https://github.com/mhiro2/nagori"

            livecheck do
              skip "Auto-generated on release."
            end

            app "Nagori.app"

            zap trash: [
              "~/Library/Application Support/dev.nagori.desktop",
              "~/Library/Caches/dev.nagori.desktop",
              "~/Library/Logs/dev.nagori.desktop",
              "~/Library/Preferences/dev.nagori.desktop.plist",
            ]
          end
          EOF
          cat tap/Casks/nagori.rb
      - name: Commit and push to homebrew-tap
        if: steps.meta.outputs.skip != 'true'
        working-directory: tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Casks/nagori.rb; then
            echo "Casks/nagori.rb already up to date for v${VERSION}"
            exit 0
          fi
          git add Casks/nagori.rb
          git commit -m "nagori: bump to ${VERSION}"
          git push origin HEAD:main
