name: E2E (Windows)

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "apps/desktop/src-tauri/**"
      - "scripts/e2e-windows.ps1"
      - ".github/workflows/e2e-windows.yaml"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

permissions:
  contents: read

jobs:
  clipboard:
    name: Clipboard E2E
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-windows
      - name: Build nagori CLI (release)
        run: cargo build --release -p nagori-cli
      - name: Run clipboard E2E
        run: pwsh -File scripts/e2e-windows.ps1
        env:
          NAGORI_E2E_BIN: ${{ github.workspace }}\target\release\nagori.exe
