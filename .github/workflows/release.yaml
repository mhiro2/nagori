name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    shell: bash -euo pipefail {0}

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare draft release
    # Create (or reuse) the draft release once, up front, and hand its
    # `releaseId` to every bundle row. `tauri-action`'s `getOrCreateRelease`
    # has no concurrency guard: with the matrix parallelised, several rows
    # would each find no draft for a fresh tag and all call `createRelease`,
    # producing duplicate drafts with the same tag and scattering bundles
    # across them. Passing `releaseId` makes each row skip the get-or-create
    # path entirely (see `if (tagName && !releaseId)` in tauri-action), so the
    # draft is authored exactly once here.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      releaseId: ${{ steps.draft.outputs.releaseId }}
    steps:
      - name: Get or create draft release
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # A draft release can't be fetched by tag via the API, so list
          # releases and match on tag_name (mirrors tauri-action). Reusing an
          # existing draft keeps re-runs of the same tag idempotent.
          release_id="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" \
            --jq ".[] | select(.tag_name == \"${TAG}\") | .id" | head -n1)"
          if [ -z "${release_id}" ]; then
            echo "No release found for ${TAG}; creating a draft."
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
              -f "tag_name=${TAG}" \
              -f "name=${TAG}" \
              -f "target_commitish=${GITHUB_SHA}" \
              -F draft=true \
              --jq '.id')"
          else
            echo "Reusing existing release ${release_id} for ${TAG}."
          fi
          echo "releaseId=${release_id}" >> "${GITHUB_OUTPUT}"

  bundle:
    name: Bundle (${{ matrix.target }})
    needs: prepare
    # Platform policy (see README → "Platform support" and ARCHITECTURE
    # updater notes): every target ships an installer bundle and an
    # `updater` companion (created by `bundle.createUpdaterArtifacts`
    # in tauri.conf.json). macOS arm64/x86_64 deliver `.app`/`.dmg`,
    # Linux ships `deb` (Debian/Ubuntu family) plus `appimage` (any
    # distro + the only Linux format the updater plugin can install
    # in place), and Windows ships an unsigned NSIS `.exe`. The
    # runtime always probes `latest.json` and reports the in-app
    # install capability per bundle type, so users on `deb` see an
    # availability notice and follow the GitHub release link.
    # Windows code-signing is still pending — until an EV cert lands
    # the NSIS bundle triggers a SmartScreen warning on first launch.
    strategy:
      fail-fast: false
      # Every row builds in parallel with `includeUpdaterJson: false`, so no
      # row writes `latest.json` and the per-row asset uploads never race on
      # it (each platform's bundles/signatures have distinct names). The
      # `tauri-action` `uploadVersionJSON` step is the only part gated by
      # `includeUpdaterJson`; the signed updater artifacts (`.sig`) are
      # uploaded unconditionally. The consolidated manifest is assembled once
      # afterwards by the `updater` job from those attached artifacts.
      matrix:
        include:
          - os: macos-26
            target: aarch64-apple-darwin
            bundles: app,dmg
          - os: macos-26-intel
            target: x86_64-apple-darwin
            bundles: app,dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: Install Linux WebKit build deps
        if: matrix.os == 'ubuntu-latest'
        uses: awalsh128/cache-apt-pkgs-action@5513791f75b039e2a79653b1a92238d3fb8d99b4 # v1.6.2
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          version: 1
      - name: Verify Cargo version matches release tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="nagori-desktop") | .version')"
          test "${TAG_VERSION}" = "${CARGO_VERSION}"
      - name: Verify updater pubkey is configured
        # `tauri-plugin-updater` rejects every payload when the bundled
        # `pubkey` is empty, which would silently break in-app upgrades.
        # Fail the release tag instead of shipping an unverifiable bundle.
        # Strip whitespace and refuse common placeholders before
        # checking length — a config like `pubkey: " "` or
        # `pubkey: "TODO"` would otherwise sneak past a bare `-z` test.
        run: |
          RAW="$(jq -r '.plugins.updater.pubkey // ""' apps/desktop/src-tauri/tauri.conf.json)"
          PUBKEY="$(printf '%s' "${RAW}" | tr -d '[:space:]')"
          case "${PUBKEY}" in
            ""|TODO|FIXME|REPLACE_ME|REPLACE-ME)
              echo "::error::plugins.updater.pubkey is empty or a placeholder (\"${PUBKEY}\") in tauri.conf.json — generate a key with 'pnpm --dir apps/desktop exec tauri signer generate' and commit the public key."
              exit 1
              ;;
          esac
          # Tauri's signer prints minisign-style base64 pubkeys (~84
          # chars). Anything shorter than 32 chars is almost certainly
          # truncated or a stub.
          if [ "${#PUBKEY}" -lt 32 ]; then
            echo "::error::plugins.updater.pubkey looks too short (${#PUBKEY} chars after trimming) — verify you copied the full base64 string from 'pnpm --dir apps/desktop exec tauri signer generate'."
            exit 1
          fi
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build bundle and upload to draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — generate with
          # `pnpm --dir apps/desktop exec tauri signer generate` and add as repo
          # secrets to enable signed updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          # `tauri-action` defaults to `npm run tauri` but this repo is
          # pnpm-only (`pnpm-workspace.yaml` at the root, no per-package
          # lockfile under `apps/desktop`), so the auto-detected manager
          # falls back to npm and `npm run tauri` fails with
          # `Missing script: "tauri"`. Invoke the CLI through pnpm exec
          # directly so the binary resolves via the workspace install
          # the previous step already populated.
          tauriScript: pnpm exec tauri
          # `tauri.bundle.conf.json` adds `bundle.externalBin` so the `nagori`
          # CLI rides inside the app bundle. It is merged only here (not in the
          # base config) so plain `cargo` workspace builds don't require the
          # staged sidecar that tauri-build validates when externalBin is set.
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config src-tauri/tauri.bundle.conf.json
          # Upload into the draft authored by the `prepare` job. Passing
          # `releaseId` (instead of `tagName`/`releaseName`) skips
          # tauri-action's get-or-create path, so parallel rows can't each
          # create a duplicate draft for a fresh tag.
          releaseId: ${{ needs.prepare.outputs.releaseId }}
          includeRelease: true
          # `latest.json` is built once by the `updater` job (see the matrix
          # strategy note) to avoid parallel rows racing on the same asset.
          # Setting this false only skips manifest generation here — the
          # signed updater artifacts (`.sig`) are still uploaded.
          includeUpdaterJson: false

  updater:
    name: Generate updater manifest
    needs: bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Build and upload latest.json
        # `tauri-action`'s `uploadVersionJSON` does a read-modify-write on the
        # release's `latest.json` (read existing → merge this row's platform →
        # delete → re-upload) with no locking, so running it per matrix row in
        # parallel races and only the last writer's platforms survive. The
        # bundle matrix therefore skips it (`includeUpdaterJson: false`) and we
        # assemble the full manifest here, once, from the signed updater
        # artifacts already attached to the draft release. Mapping (platform
        # key -> updater artifact) mirrors what `tauri-action` would emit; keep
        # it in sync with the `bundles` produced by the matrix.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          mkdir -p sigs
          gh release download "${TAG}" --repo "${GITHUB_REPOSITORY}" --pattern '*.sig' --dir sigs
          gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json assets \
            --jq '.assets[].name' > assets.txt

          # Resolve an updater artifact's asset name by filename suffix. Asset
          # names embed the version for Linux/Windows but not macOS, so match on
          # the suffix rather than reconstructing the full name. `|| true` keeps
          # an empty result from tripping `pipefail`; `add` validates presence.
          resolve() {
            grep -E "$1" assets.txt | grep -v '\.sig$' | head -n1 || true
          }

          platforms='{}'
          add() {
            local key="$1" asset="$2"
            if [ -z "${asset}" ] || [ ! -f "sigs/${asset}.sig" ]; then
              echo "::error::missing updater artifact or signature for '${key}' (asset='${asset}') — did a bundle row fail?"
              exit 1
            fi
            local sig url
            sig="$(cat "sigs/${asset}.sig")"
            url="${base}/${asset}"
            platforms="$(jq --arg k "${key}" --arg s "${sig}" --arg u "${url}" \
              '.[$k] = {signature: $s, url: $u}' <<<"${platforms}")"
          }

          mac_arm="$(resolve 'aarch64\.app\.tar\.gz$')"
          mac_x64="$(resolve 'x64\.app\.tar\.gz$')"
          appimage="$(resolve '\.AppImage$')"
          deb="$(resolve '\.deb$')"
          nsis="$(resolve 'x64-setup\.exe$')"

          add 'darwin-aarch64'        "${mac_arm}"
          add 'darwin-aarch64-app'    "${mac_arm}"
          add 'darwin-x86_64'         "${mac_x64}"
          add 'darwin-x86_64-app'     "${mac_x64}"
          add 'linux-x86_64'          "${appimage}"
          add 'linux-x86_64-appimage' "${appimage}"
          add 'linux-x86_64-deb'      "${deb}"
          add 'windows-x86_64'        "${nsis}"
          add 'windows-x86_64-nsis'   "${nsis}"

          jq -n \
            --arg v "${VERSION}" \
            --arg d "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            --argjson p "${platforms}" \
            '{version: $v, notes: "", pub_date: $d, platforms: $p}' > latest.json

          echo "::group::latest.json"
          cat latest.json
          echo "::endgroup::"

          gh release upload "${TAG}" --repo "${GITHUB_REPOSITORY}" latest.json --clobber

  publish:
    name: Publish release
    needs: updater
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `actions: write` lets the final step dispatch brew-bump. The job-level
    # block replaces the workflow-level `contents: write`, so both scopes are
    # listed here.
    permissions:
      contents: write
      actions: write
    steps:
      - name: Publish draft release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --repo "${GITHUB_REPOSITORY}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger Homebrew tap bump
        # Flipping the draft to published with the default GITHUB_TOKEN does
        # NOT emit a `release: published` event that starts other workflows
        # (GitHub blocks that to avoid recursive runs). So dispatch brew-bump
        # explicitly here — workflow_dispatch is one of the two events the
        # GITHUB_TOKEN is allowed to trigger.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh workflow run brew-bump.yaml --repo "${GITHUB_REPOSITORY}" -f tag="${TAG}"
