name: E2E (Linux)

# Linux Wayland E2E runs on a schedule (and on-demand) rather than as a
# PR-required check: provisioning a headless wlroots compositor + seatd on
# the GitHub runner is inherently flaky, and we don't want unrelated PRs
# to be blocked by infrastructure flakes we can't fix from the PR diff.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "apps/desktop/src-tauri/**"
      - "scripts/e2e-linux.sh"
      - ".github/workflows/e2e-linux.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

jobs:
  clipboard:
    name: Clipboard E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-linux
      - name: Install Wayland stack
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            sway seatd wl-clipboard jq
      - name: Build nagori CLI (release)
        run: cargo build --release -p nagori-cli
      - name: Run clipboard E2E under headless sway
        env:
          # sway/wlroots picks the headless backend so no GPU is needed, and
          # the pixman renderer avoids the missing EGL / DRM stack on the
          # GitHub runner. `WLR_LIBINPUT_NO_DEVICES=1` keeps wlroots from
          # probing /dev/input under libinput, which is unavailable here.
          WLR_BACKENDS: headless
          WLR_LIBINPUT_NO_DEVICES: "1"
          WLR_RENDERER: pixman
          # Pin libseat to the seatd backend so it doesn't probe logind /
          # other backends that aren't wired up on this minimal runner.
          LIBSEAT_BACKEND: seatd
          WAYLAND_DISPLAY: wayland-1
          NAGORI_E2E_BIN: ${{ github.workspace }}/target/release/nagori
        run: |
          XDG_RUNTIME_DIR="$(mktemp -d -t nagori-wlrun.XXXXXX)"
          chmod 700 "${XDG_RUNTIME_DIR}"
          export XDG_RUNTIME_DIR

          SWAY_LOG="${XDG_RUNTIME_DIR}/sway.log"
          SWAY_PID=""

          # Reap sway on any exit path — socket-wait failure, e2e failure,
          # job cancellation. Without this, an early `exit 1` would orphan
          # the background sway process and leak the runtime dir.
          cleanup() {
            local rc=$?
            if [[ -n "${SWAY_PID}" ]] && kill -0 "${SWAY_PID}" 2>/dev/null; then
              kill "${SWAY_PID}" 2>/dev/null || true
              wait "${SWAY_PID}" 2>/dev/null || true
            fi
            if (( rc != 0 )) && [[ -f "${SWAY_LOG}" ]]; then
              echo "::group::sway log (${SWAY_LOG})"
              cat "${SWAY_LOG}" 2>/dev/null || true
              echo "::endgroup::"
            fi
          }
          trap cleanup EXIT INT TERM

          # seatd is required by sway even on the headless backend so it
          # can hand out a (no-op) seat. Run it as root in the background
          # and let the current user group talk to its socket.
          sudo -b seatd -g "$(id -gn)"
          # Give seatd a moment to bind /run/seatd.sock with the right gid.
          for _ in $(seq 1 25); do
            [[ -S /run/seatd.sock ]] && break
            sleep 0.2
          done
          if [[ ! -S /run/seatd.sock ]]; then
            echo "::error::seatd failed to start"
            exit 1
          fi

          # `-c /dev/null` keeps sway from sourcing /etc/sway/config and
          # avoids any DE-specific auto-launch lines that would block under
          # the headless backend.
          sway -c /dev/null > "${SWAY_LOG}" 2>&1 &
          SWAY_PID=$!

          for _ in $(seq 1 75); do
            [[ -S "${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}" ]] && break
            sleep 0.2
          done
          if [[ ! -S "${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}" ]]; then
            echo "::error::sway did not expose ${WAYLAND_DISPLAY}; log follows"
            cat "${SWAY_LOG}"
            exit 1
          fi

          ./scripts/e2e-linux.sh
