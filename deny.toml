[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[advisories]
yanked = "deny"
ignore = [
  # proc-macro-error 1.0.4 (unmaintained)
  # Path: glib-macros 0.18.5 -> proc-macro-error 1.0.4
  # Origin: libappindicator / gtk-rs 0.18 (Tauri 2 Linux tray-icon stack)
  # Upstream: fixed in glib-macros 0.22 (migrated to proc-macro-error2). Cannot be removed
  # while Tauri 2 stays on gtk-rs 0.18.
  # Tracking: https://github.com/tauri-apps/tauri/issues/10910
  { id = "RUSTSEC-2024-0370", reason = "transitive via glib-macros 0.18 (Tauri 2 GTK3 stack); upstream fixed in glib-macros 0.22" },

  # gtk-rs GTK3 bindings (unmaintained) — kept until Tauri 2 migrates to GTK4
  # Path: tray-icon / muda / wry -> libappindicator / gtk / gdk / atk / ...
  # Upstream: gtk4-rs port in flight via tauri-apps/tao#1104 (not yet released).
  # Tracking: https://github.com/tauri-apps/tauri/issues/7335 https://github.com/tauri-apps/tauri/issues/11924
  { id = "RUSTSEC-2024-0411", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335 (GTK4 migration)" },
  { id = "RUSTSEC-2024-0412", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },
  { id = "RUSTSEC-2024-0413", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },
  { id = "RUSTSEC-2024-0414", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },
  { id = "RUSTSEC-2024-0415", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },
  { id = "RUSTSEC-2024-0416", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },
  { id = "RUSTSEC-2024-0417", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },
  { id = "RUSTSEC-2024-0418", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },
  { id = "RUSTSEC-2024-0419", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },
  { id = "RUSTSEC-2024-0420", reason = "gtk-rs GTK3 unmaintained; tracked via tauri#7335" },

  # unic-* (unmaintained)
  # Path: tauri-utils 2.9.0 -> urlpattern 0.3.0 -> unic-ucd-ident 0.9.0 -> unic-*
  # Upstream: urlpattern 0.6.0 dropped the unic-* dependency, but tauri-utils still pins 0.3.0.
  { id = "RUSTSEC-2025-0075", reason = "transitive via tauri-utils -> urlpattern 0.3.0; upstream fixed in urlpattern 0.6" },
  { id = "RUSTSEC-2025-0080", reason = "transitive via tauri-utils -> urlpattern 0.3.0; upstream fixed in urlpattern 0.6" },
  { id = "RUSTSEC-2025-0081", reason = "transitive via tauri-utils -> urlpattern 0.3.0; upstream fixed in urlpattern 0.6" },
  { id = "RUSTSEC-2025-0098", reason = "transitive via tauri-utils -> urlpattern 0.3.0; upstream fixed in urlpattern 0.6" },
  { id = "RUSTSEC-2025-0100", reason = "transitive via tauri-utils -> urlpattern 0.3.0; upstream fixed in urlpattern 0.6" },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
